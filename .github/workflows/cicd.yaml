name: RuNova AWS CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"

  workflow_dispatch:

concurrency:
  group: runova-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ============================================================
  # 1. CONTINUOUS INTEGRATION
  # ============================================================

  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m compileall .

      - name: Verify FastAPI application
        env:
            GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
            TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
            HF_TOKEN: ${{ secrets.HF_TOKEN }}
            OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
            ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
            GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
            SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
            ALLOW_DEV_LOGIN: ${{ secrets.ALLOW_DEV_LOGIN }}
        run: |
            python -c "from api import app; print('FastAPI app loaded successfully')"

  # ============================================================
  # 2. BUILD & PUSH DOCKER IMAGE
  # ============================================================

  push_to_registry:
    name: Build and Push Docker Image
    needs: integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Docker configuration
        env:
            DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
            IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
        run: |
            echo "Username length: ${#DOCKER_USERNAME}"
            echo "Image length: ${#IMAGE_NAME}"

            if [ -z "$DOCKER_USERNAME" ]; then
            echo "DOCKER_USERNAME is missing"
            exit 1
            fi

            if [ -z "$IMAGE_NAME" ]; then
            echo "IMAGE_NAME is missing"
            exit 1
            fi

            echo "Docker configuration is OK"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 3. DEPLOY TO AWS EC2
  # ============================================================

  deploy:
    name: Deploy to AWS EC2
    needs: push_to_registry
    runs-on: self-hosted

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Validate application secrets
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ALLOW_DEV_LOGIN: ${{ secrets.ALLOW_DEV_LOGIN }}
        run: |
          for secret in \
            GROQ_API_KEY \
            TAVILY_API_KEY \
            OPENWEATHER_API_KEY \
            ALPHAVANTAGE_API_KEY \
            GOOGLE_CLIENT_ID \
            SESSION_SECRET \
            ALLOW_DEV_LOGIN
          do
            if [ -z "${!secret}" ]; then
              echo "$secret is missing."
              exit 1
            fi
          done

      - name: Pull latest Docker image
        env:
          IMAGE_PATH: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}
        run: |
          docker pull ${IMAGE_PATH}:latest

      - name: Stop existing container
        run: |
          docker rm -f runova 2>/dev/null || true

      - name: Run RuNova container
        env:
          IMAGE_PATH: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}

          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ALLOW_DEV_LOGIN: ${{ secrets.ALLOW_DEV_LOGIN }}

        run: |
          docker run -d \
            --restart unless-stopped \
            --name runova \
            -p 8000:8000 \
            -e GROQ_API_KEY \
            -e TAVILY_API_KEY \
            -e OPENWEATHER_API_KEY \
            -e ALPHAVANTAGE_API_KEY \
            -e GOOGLE_CLIENT_ID \
            -e SESSION_SECRET \
            -e ALLOW_DEV_LOGIN \
            ${IMAGE_PATH}:latest

      - name: Verify container is running
        run: |
          sleep 10

          if ! docker ps \
            --filter "name=^runova$" \
            --filter "status=running" \
            --format "{{.Names}}" | grep -q "^runova$"; then

            echo "RuNova container failed to start."
            docker logs runova || true
            exit 1
          fi

          echo "RuNova container is running."

      - name: Verify FastAPI health endpoint
        run: |
          for attempt in $(seq 1 12); do

            if docker exec runova python -c \
              "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)" \
              >/dev/null 2>&1; then

              echo "RuNova application is healthy."
              exit 0
            fi

            echo "Waiting for application to become ready..."
            sleep 5

          done

          echo "Health check failed."
          docker logs --tail 100 runova || true
          exit 1

      - name: Show application logs
        if: always()
        run: |
          docker logs --tail 50 runova 2>/dev/null || true

      - name: Remove unused Docker images
        if: always()
        run: |
          docker image prune -f